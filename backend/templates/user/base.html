<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Food Ordering{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f7fafc;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 { font-size: 1.15rem; }
        .header .user-info { font-size: 0.8rem; opacity: 0.9; }
        .nav { display: flex; gap: 8px; flex-wrap: wrap; }
        .nav a {
            color: #fff;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.35);
        }
        .nav a:hover, .nav a.active { background: rgba(255,255,255,0.2); }
        .container { max-width: 720px; margin: 32px auto; padding: 0 20px; }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .card h2 { color: #2d3748; font-size: 1.2rem; margin-bottom: 8px; }
        .card p.sub { color: #718096; font-size: 0.9rem; margin-bottom: 16px; }
        .msg { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.875rem; }
        .msg-success { background: #c6f6d5; color: #22543d; }
        .msg-error { background: #fed7d7; color: #742a2a; }
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #edf2f7;
            gap: 16px;
        }
        .menu-item:last-child { border-bottom: none; }
        .item-info h3 { color: #2d3748; font-size: 1rem; }
        .item-info span { color: #a0aec0; font-size: 0.8rem; }
        .qty-control { display: flex; align-items: center; gap: 8px; }
        .qty-btn {
            width: 36px; height: 36px;
            border: 1px solid #e2e8f0;
            background: #fff;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            color: #4a5568;
        }
        .qty-btn:hover { background: #edf2f7; }
        .qty-input {
            width: 48px;
            text-align: center;
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-open { background: #c6f6d5; color: #22543d; }
        .badge-closed { background: #fed7d7; color: #742a2a; }
        .empty { text-align: center; padding: 40px 20px; color: #a0aec0; }
        .empty .icon { font-size: 3rem; margin-bottom: 12px; }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 12px;
            font-family: inherit;
        }
        .order-card { border-left: 4px solid #667eea; padding-left: 16px; margin-bottom: 16px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="header">
        <div>
            <h1>🍽️ Food Ordering</h1>
            <div class="user-info">{{ request.user.get_full_name }}</div>
        </div>
        <nav class="nav">
            <a href="{% url 'today_menu' %}" class="{% if request.resolver_match.url_name == 'today_menu' %}active{% endif %}">Today's Menu</a>
            <a href="{% url 'my_orders' %}" class="{% if request.resolver_match.url_name == 'my_orders' %}active{% endif %}">My Orders</a>
            <a href="{% url 'logout' %}">Logout</a>
        </nav>
    </div>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
            <div class="msg msg-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    {% block extra_js %}{% endblock %}
</body>
</html>
